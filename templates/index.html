<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khumaira AI Admin Dashboard</title>
    <meta name="description" content="Admin Dashboard for Khumaira AI WhatsApp Bot">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Toast Notification -->
    <div id="toast-container"></div>

    <!-- Modals Container -->
    <div id="modal-overlay" class="modal-overlay" style="display:none;">
        <div id="modal-content" class="modal-box">
            <!-- Dynamic modal content -->
        </div>
    </div>

    <div class="layout-container">
        <!-- 1. Sidebar: Conversations -->
        <div class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <h4 style="margin: 0; color: white;">Conversations</h4>
                    <button id="btn-logout" class="btn-icon" title="Logout"><i
                            class="bi bi-box-arrow-right"></i></button>
                </div>
                <input type="text" id="search-input" class="search-box" placeholder="Search chats...">
            </div>
            <div id="conversations-list" class="conversation-list">
                <!-- Javascript will populate this -->
            </div>
        </div>

        <!-- 2. Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="d-flex align-items-center">
                    <i class="bi bi-person-circle fs-3 me-3" style="color: var(--text-secondary);"></i>
                    <div>
                        <h3 id="chat-title">Select a Chat</h3>
                        <span id="chat-status" class="info-label" style="text-transform: none;">Waiting for
                            selection...</span>
                    </div>
                </div>
                <div id="control-panel" style="display: none; align-items: center; gap: 10px;">
                    <button id="btn-search-chat" class="btn-icon" title="Search in chat"><i
                            class="bi bi-search"></i></button>
                    <button id="btn-export" class="btn-icon" title="Export Chat"><i class="bi bi-download"></i></button>
                    <button id="btn-label" class="btn-icon" title="Set Label"><i class="bi bi-tag"></i></button>
                    <button id="btn-delete-chat" class="btn-icon btn-danger-icon" title="Delete Chat"><i
                            class="bi bi-trash3"></i></button>
                    <div class="control-divider"></div>
                    <span class="info-label">AI</span>
                    <label class="switch">
                        <input type="checkbox" id="control-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- Search bar (hidden by default) -->
            <div id="search-chat-bar" class="search-chat-bar" style="display: none;">
                <input type="text" id="search-chat-input" class="input-field" placeholder="Cari pesan..."
                    style="flex: 1;">
                <button id="btn-search-chat-go" class="btn btn-sm"><i class="bi bi-search"></i></button>
                <button id="btn-search-chat-close" class="btn btn-sm" style="background: var(--text-secondary);"><i
                        class="bi bi-x-lg"></i></button>
            </div>

            <div id="chat-window" class="chat-messages">
                <div class="empty-state">
                    <i class="bi bi-chat-square-text" style="font-size: 4rem; margin-bottom: 20px;"></i>
                    <p>Select a conversation to start monitoring</p>
                </div>
            </div>

            <!-- Admin Input -->
            <div id="input-area" class="input-area" style="display: none;">
                <form id="reply-form" class="input-group">
                    <input type="text" id="reply-input" class="input-field" placeholder="Type a message as admin..."
                        autocomplete="off">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
                    <button type="button" id="btn-attal" class="btn" style="background: var(--text-secondary);"
                        title="Summarize"><i class="bi bi-magic"></i></button>
                </form>
            </div>
        </div>

        <!-- 3. Right Panel: Tabs -->
        <div class="info-panel glass-panel">
            <div class="tab-bar">
                <button class="tab-btn active" data-tab="overview"><i class="bi bi-grid"></i> Overview</button>
                <button class="tab-btn" data-tab="tools"><i class="bi bi-tools"></i> Tools</button>
                <button class="tab-btn" data-tab="analytics"><i class="bi bi-bar-chart"></i> Stats</button>
            </div>

            <!-- Overview Tab -->
            <div id="tab-overview" class="tab-content active">
                <div class="info-card">
                    <div class="info-label">Current Model</div>
                    <div class="info-value" id="stat-model">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Active Chats</div>
                    <div class="info-value" id="stat-active-chats">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Server Uptime</div>
                    <div class="info-value" id="stat-uptime">-</div>
                </div>
                <div id="summary-card" class="info-card" style="display: none;">
                    <div class="info-label" style="color: var(--accent-color);">Chat Summary</div>
                    <p id="chat-summary-text" style="font-size: 0.85rem; margin-top: 5px;"></p>
                </div>
                <div id="label-display" class="info-card" style="display: none;">
                    <div class="info-label">Label</div>
                    <div class="info-value"><span id="current-label" class="label-badge">-</span></div>
                </div>
            </div>

            <!-- Tools Tab -->
            <div id="tab-tools" class="tab-content">
                <div class="tool-section">
                    <h5><i class="bi bi-megaphone"></i> Broadcast</h5>
                    <textarea id="broadcast-text" class="input-field" placeholder="Pesan broadcast..."
                        rows="3"></textarea>
                    <button id="btn-broadcast" class="btn btn-primary btn-full"><i class="bi bi-send"></i> Kirim
                        Broadcast</button>
                </div>
                <div class="tool-section">
                    <h5><i class="bi bi-file-text"></i> Templates</h5>
                    <div id="templates-list" class="mini-list"></div>
                    <div class="input-row">
                        <input type="text" id="tpl-name" class="input-field" placeholder="Nama">
                        <input type="text" id="tpl-content" class="input-field" placeholder="Isi">
                        <button id="btn-add-tpl" class="btn btn-sm"><i class="bi bi-plus"></i></button>
                    </div>
                </div>
                <div class="tool-section">
                    <h5><i class="bi bi-reply"></i> Auto-Reply</h5>
                    <div id="auto-replies-list" class="mini-list"></div>
                    <div class="input-row">
                        <input type="text" id="ar-keyword" class="input-field" placeholder="Keyword">
                        <input type="text" id="ar-response" class="input-field" placeholder="Respon">
                        <button id="btn-add-ar" class="btn btn-sm"><i class="bi bi-plus"></i></button>
                    </div>
                </div>
            </div>

            <!-- Analytics Tab -->
            <div id="tab-analytics" class="tab-content">
                <div class="info-card">
                    <div class="info-label">Total Messages</div>
                    <div class="info-value" id="stat-total-messages">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Total Chats</div>
                    <div class="info-value" id="stat-total-chats">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Messages (7 Days)</div>
                    <div id="chart-daily" class="mini-chart"></div>
                </div>
                <div class="info-card">
                    <div class="info-label">Top Active Chats</div>
                    <div id="top-chats-list" class="mini-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
