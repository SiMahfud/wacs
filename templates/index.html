<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khumaira AI Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="layout-container">
        <!-- 1. Sidebar: Conversations -->
        <div class="sidebar glass-panel">
            <div class="sidebar-header">
                <h4 style="margin: 0 0 15px 0; color: white;">Conversations</h4>
                <input type="text" id="search-input" class="search-box" placeholder="Search chats...">
            </div>
            <div id="conversations-list" class="conversation-list">
                <!-- Javascript will populate this -->
            </div>
        </div>

        <!-- 2. Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="d-flex align-items-center">
                    <i class="bi bi-person-circle fs-3 me-3" style="color: var(--text-secondary);"></i>
                    <div>
                        <h3 id="chat-title">Select a Chat</h3>
                        <span id="chat-status" class="info-label" style="text-transform: none;">Waiting for selection...</span>
                    </div>
                </div>
                <div id="control-panel" style="display: none; align-items: center; gap: 15px;">
                    <span class="info-label me-2">AI Control</span>
                    <label class="switch">
                        <input type="checkbox" id="control-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div id="chat-window" class="chat-messages">
                <div class="d-flex justify-content-center align-items-center h-100 flex-column" style="opacity: 0.5;">
                    <i class="bi bi-chat-square-text" style="font-size: 4rem; margin-bottom: 20px;"></i>
                    <p>Select a conversation to start monitoring</p>
                </div>
            </div>

            <!-- Admin Input (Hidden by default) -->
            <div id="input-area" class="input-area" style="display: none;">
                <form id="reply-form" class="input-group">
                    <input type="text" id="reply-input" class="input-field" placeholder="Type a message as admin..." autocomplete="off">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send-fill"></i> Send
                    </button>
                    <button type="button" id="btn-attal" class="btn btn-primary" style="background: var(--text-secondary);" title="Summarize Chat">
                        <i class="bi bi-magic"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- 3. Info Panel (Right Sidebar) -->
        <div class="info-panel glass-panel">
            <div class="sidebar-header">
                <h4 style="margin: 0; color: white;">Overview</h4>
            </div>
            <div class="p-4">
                <div class="info-card">
                    <div class="info-label">Current Model</div>
                    <div class="info-value" id="stat-model">Gemini Pro</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">Active Chats</div>
                    <div class="info-value" id="stat-active-chats">-</div>
                </div>

                <div class="info-card">
                    <div class="info-label">Server Uptime</div>
                    <div class="info-value" id="stat-uptime">-</div>
                </div>

                <div id="summary-card" class="info-card animate__animated animate__fadeIn" style="display: none;">
                    <div class="info-label" style="color: var(--accent-color);">Chat Summary</div>
                    <p id="chat-summary-text" style="font-size: 0.9rem; margin-top: 5px; color: var(--text-primary);"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
