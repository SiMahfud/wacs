<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khumaira AI — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
        }
        body, html {
            height: 100%; margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }
        .login-header {
            text-align: center; margin-bottom: 35px;
        }
        .login-header .logo {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            border-radius: 18px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 2rem; margin-bottom: 15px;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }
        .login-header h1 {
            font-size: 1.5rem; margin: 0 0 5px 0; font-weight: 600;
        }
        .login-header p {
            color: var(--text-secondary); font-size: 0.9rem; margin: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block; font-size: 0.85rem; color: var(--text-secondary);
            margin-bottom: 8px; font-weight: 500;
        }
        .form-group input {
            width: 100%; box-sizing: border-box;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 10px; color: white;
            font-size: 0.95rem; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .login-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent-color), #2563eb);
            border: none; border-radius: 10px;
            color: white; font-size: 1rem;
            font-weight: 600; cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .login-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger-color);
            padding: 12px; border-radius: 8px;
            font-size: 0.85rem; margin-bottom: 15px;
            display: none; text-align: center;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo"><i class="bi bi-robot"></i></div>
            <h1>Khumaira AI</h1>
            <p>Admin Dashboard Login</p>
        </div>
        <div id="error-msg" class="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">
                <i class="bi bi-box-arrow-in-right"></i> Masuk
            </button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span>Memproses...</span>';
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    errorMsg.textContent = data.error || 'Login gagal. Periksa username dan password.';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Terjadi kesalahan koneksi.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Masuk';
            }
        });
    </script>
</body>
</html>
